<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PS5 Controller Overlay</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="overlay" class="skin-clean-white">
    <div class="controller">
      <div class="button" id="btn-cross"></div>
      <div class="button" id="btn-circle"></div>
      <div class="button" id="btn-square"></div>
      <div class="button" id="btn-triangle"></div>
      <div class="stick" id="stick-left"></div>
      <div class="stick" id="stick-right"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
